<text x="494" y="430" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,sans-serif" font-size="12.5" fill="#8b949e" text-anchor="start" font-weight="400" letter-spacing="0">Optional control panel: step edit, table editor, live monitor.</text>
