<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 600" width="880" height="600" role="img" aria-label="ChordLoop — jacks, knobs &amp; switch">
<rect x="0" y="0" width="880" height="600" rx="14" fill="#0e1116"/>
<text x="30" y="44" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,sans-serif" font-size="22" fill="#e6edf3" text-anchor="start" font-weight="700" letter-spacing="0">ChordLoop — jacks, knobs &amp; switch</text>
<text x="30" y="68" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,sans-serif" font-size="13" fill="#8b949e" text-anchor="start" font-weight="400" letter-spacing="0">A Turing-Machine shift register decoded into diatonic chords. Fully playable standalone.</text>
<text x="34" y="112" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,sans-serif" font-size="12" fill="#8b949e" text-anchor="start" font-weight="700" letter-spacing="1.5">CONTROLS</text><rect x="34" y="120" width="46" height="2" rx="1" fill="#8b949e"/>
<rect x="34" y="138" width="132" height="30" rx="7" fill="#1c232d" stroke="#2b333e" stroke-width="1"/><rect x="34" y="138" width="4" height="30" rx="2" fill="#3fb950"/><text x="48" y="158" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="12.5" fill="#e6edf3" text-anchor="start" font-weight="600" letter-spacing="0">Main knob</text><text x="180" y="158" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,sans-serif" font-size="13" fill="#8b949e" text-anchor="start" font-weight="400" letter-spacing="0">Mutation probability (Turing)</text>
<rect x="34" y="178" width="132" height="30" rx="7" fill="#1c232d" stroke="#2b333e" stroke-width="1"/><rect x="34" y="178" width="4" height="30" rx="2" fill="#3fb950"/><text x="48" y="198" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="12.5" fill="#e6edf3" text-anchor="start" font-weight="600" letter-spacing="0">Knob X</text><text x="180" y="198" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,sans-serif" font-size="13" fill="#8b949e" text-anchor="start" font-weight="400" letter-spacing="0">Length — 2·3·4·6·8</text>
<rect x="34" y="218" width="132" height="30" rx="7" fill="#1c232d" stroke="#2b333e" stroke-width="1"/><rect x="34" y="218" width="4" height="30" rx="2" fill="#3fb950"/><text x="48" y="238" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="12.5" fill="#e6edf3" text-anchor="start" font-weight="600" letter-spacing="0">Knob Y</text><text x="180" y="238" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,sans-serif" font-size="13" fill="#8b949e" text-anchor="start" font-weight="400" letter-spacing="0">Scale — 8 slots</text>
<rect x="34" y="258" width="132" height="30" rx="7" fill="#1c232d" stroke="#2b333e" stroke-width="1"/><rect x="34" y="258" width="4" height="30" rx="2" fill="#3fb950"/><text x="48" y="278" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="12.5" fill="#e6edf3" text-anchor="start" font-weight="600" letter-spacing="0">Switch Z</text><text x="180" y="278" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,sans-serif" font-size="13" fill="#8b949e" text-anchor="start" font-weight="400" letter-spacing="0">Up lock · Mid run · Dn random</text>
<rect x="34" y="298" width="132" height="30" rx="7" fill="#1c232d" stroke="#2b333e" stroke-width="1"/><rect x="34" y="298" width="4" height="30" rx="2" fill="#fbbf24"/><text x="48" y="318" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="12.5" fill="#e6edf3" text-anchor="start" font-weight="600" letter-spacing="0">LEDs 0–5</text><text x="180" y="318" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,sans-serif" font-size="13" fill="#8b949e" text-anchor="start" font-weight="400" letter-spacing="0">Steps · pulses · lock · flash</text>
<text x="34" y="346" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,sans-serif" font-size="12" fill="#8b949e" text-anchor="start" font-weight="700" letter-spacing="1.5">INPUTS</text><rect x="34" y="354" width="46" height="2" rx="1" fill="#8b949e"/>
<rect x="34" y="372" width="132" height="30" rx="7" fill="#1c232d" stroke="#2b333e" stroke-width="1"/><rect x="34" y="372" width="4" height="30" rx="2" fill="#a78bfa"/><text x="48" y="392" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="12.5" fill="#e6edf3" text-anchor="start" font-weight="600" letter-spacing="0">CV In 1</text><text x="180" y="392" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,sans-serif" font-size="13" fill="#8b949e" text-anchor="start" font-weight="400" letter-spacing="0">Tonic — 1V/oct, quantised</text>
<rect x="34" y="412" width="132" height="30" rx="7" fill="#1c232d" stroke="#2b333e" stroke-width="1"/><rect x="34" y="412" width="4" height="30" rx="2" fill="#a78bfa"/><text x="48" y="432" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="12.5" fill="#e6edf3" text-anchor="start" font-weight="600" letter-spacing="0">CV In 2</text><text x="180" y="432" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,sans-serif" font-size="13" fill="#8b949e" text-anchor="start" font-weight="400" letter-spacing="0">Arp pattern — 5 zones</text>
<rect x="34" y="452" width="132" height="30" rx="7" fill="#1c232d" stroke="#2b333e" stroke-width="1"/><rect x="34" y="452" width="4" height="30" rx="2" fill="#a78bfa"/><text x="48" y="472" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="12.5" fill="#e6edf3" text-anchor="start" font-weight="600" letter-spacing="0">Pulse In 1</text><text x="180" y="472" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,sans-serif" font-size="13" fill="#8b949e" text-anchor="start" font-weight="400" letter-spacing="0">Clock — arp / chord ÷N</text>
<rect x="34" y="492" width="132" height="30" rx="7" fill="#1c232d" stroke="#2b333e" stroke-width="1"/><rect x="34" y="492" width="4" height="30" rx="2" fill="#a78bfa"/><text x="48" y="512" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="12.5" fill="#e6edf3" text-anchor="start" font-weight="600" letter-spacing="0">Pulse In 2</text><text x="180" y="512" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,sans-serif" font-size="13" fill="#8b949e" text-anchor="start" font-weight="400" letter-spacing="0">Reset to step 1</text>
<text x="478" y="112" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,sans-serif" font-size="12" fill="#8b949e" text-anchor="start" font-weight="700" letter-spacing="1.5">OUTPUTS</text><rect x="478" y="120" width="46" height="2" rx="1" fill="#8b949e"/>
<rect x="478" y="138" width="132" height="30" rx="7" fill="#1c232d" stroke="#2b333e" stroke-width="1"/><rect x="478" y="138" width="4" height="30" rx="2" fill="#38bdf8"/><text x="492" y="158" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="12.5" fill="#e6edf3" text-anchor="start" font-weight="600" letter-spacing="0">CV Out 1</text><text x="624" y="158" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,sans-serif" font-size="13" fill="#8b949e" text-anchor="start" font-weight="400" letter-spacing="0">Chord root / bass — 1V/oct</text>
<rect x="478" y="178" width="132" height="30" rx="7" fill="#1c232d" stroke="#2b333e" stroke-width="1"/><rect x="478" y="178" width="4" height="30" rx="2" fill="#38bdf8"/><text x="492" y="198" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="12.5" fill="#e6edf3" text-anchor="start" font-weight="600" letter-spacing="0">CV Out 2</text><text x="624" y="198" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,sans-serif" font-size="13" fill="#8b949e" text-anchor="start" font-weight="400" letter-spacing="0">Arpeggiator — 1V/oct</text>
<rect x="478" y="218" width="132" height="30" rx="7" fill="#1c232d" stroke="#2b333e" stroke-width="1"/><rect x="478" y="218" width="4" height="30" rx="2" fill="#f472b6"/><text x="492" y="238" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="12.5" fill="#e6edf3" text-anchor="start" font-weight="600" letter-spacing="0">Pulse Out 1</text><text x="624" y="238" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,sans-serif" font-size="13" fill="#8b949e" text-anchor="start" font-weight="400" letter-spacing="0">Chord-change trigger — 10 ms</text>
<rect x="478" y="258" width="132" height="30" rx="7" fill="#1c232d" stroke="#2b333e" stroke-width="1"/><rect x="478" y="258" width="4" height="30" rx="2" fill="#f472b6"/><text x="492" y="278" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="12.5" fill="#e6edf3" text-anchor="start" font-weight="600" letter-spacing="0">Pulse Out 2</text><text x="624" y="278" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,sans-serif" font-size="13" fill="#8b949e" text-anchor="start" font-weight="400" letter-spacing="0">Arp-step trigger — 5 ms</text>
<rect x="478" y="298" width="132" height="30" rx="7" fill="#1c232d" stroke="#2b333e" stroke-width="1"/><rect x="478" y="298" width="4" height="30" rx="2" fill="#fb923c"/><text x="492" y="318" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="12.5" fill="#e6edf3" text-anchor="start" font-weight="600" letter-spacing="0">Audio Out 1</text><text x="624" y="318" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,sans-serif" font-size="13" fill="#8b949e" text-anchor="start" font-weight="400" letter-spacing="0">Internal pad — left</text>
<rect x="478" y="338" width="132" height="30" rx="7" fill="#1c232d" stroke="#2b333e" stroke-width="1"/><rect x="478" y="338" width="4" height="30" rx="2" fill="#fb923c"/><text x="492" y="358" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="12.5" fill="#e6edf3" text-anchor="start" font-weight="600" letter-spacing="0">Audio Out 2</text><text x="624" y="358" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,sans-serif" font-size="13" fill="#8b949e" text-anchor="start" font-weight="400" letter-spacing="0">Internal pad — right</text>
